<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#0B0B0B"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <!-- Outer envelope -->
  <rect x="140" y="120" width="920" height="560" fill="none" stroke="#C6F135" stroke-width="4"/>

  <!-- Interior partitions -->
  <line x1="140" y1="360" x2="560" y2="360" stroke="#C6F135" stroke-width="3"/>
  <line x1="560" y1="120" x2="560" y2="680" stroke="#C6F135" stroke-width="3"/>
  <line x1="560" y1="480" x2="1060" y2="480" stroke="#C6F135" stroke-width="3"/>
  <line x1="820" y1="480" x2="820" y2="680" stroke="#C6F135" stroke-width="3"/>
  <line x1="300" y1="360" x2="300" y2="680" stroke="#C6F135" stroke-width="2" stroke-opacity="0.55"/>

  <!-- Door swings -->
  <path d="M 300 360 A 60 60 0 0 1 360 420" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M 560 300 A 50 50 0 0 1 610 360" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M 820 480 A 50 50 0 0 0 870 530" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Windows on outer wall -->
  <line x1="220" y1="120" x2="320" y2="120" stroke="#ffffff" stroke-width="6" stroke-opacity="0.7"/>
  <line x1="700" y1="120" x2="820" y2="120" stroke="#ffffff" stroke-width="6" stroke-opacity="0.7"/>
  <line x1="1060" y1="260" x2="1060" y2="360" stroke="#ffffff" stroke-width="6" stroke-opacity="0.7"/>
  <line x1="1060" y1="540" x2="1060" y2="640" stroke="#ffffff" stroke-width="6" stroke-opacity="0.7"/>

  <!-- Furniture hints -->
  <rect x="200" y="200" width="140" height="70" rx="4" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
  <circle cx="700" cy="220" r="55" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="900" y="540" width="100" height="100" rx="4" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="620" y="540" width="150" height="60" rx="4" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Dimension lines -->
  <line x1="140" y1="90" x2="1060" y2="90" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="140" y1="80" x2="140" y2="100" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="1060" y1="80" x2="1060" y2="100" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="600" y="75" fill="#ffffff" fill-opacity="0.4" font-family="monospace" font-size="16" text-anchor="middle">18.40 m</text>

  <text x="170" y="150" fill="#C6F135" font-family="monospace" font-size="15" opacity="0.85">SÉJOUR</text>
  <text x="620" y="170" fill="#C6F135" font-family="monospace" font-size="15" opacity="0.85">CUISINE</text>
  <text x="180" y="420" fill="#C6F135" font-family="monospace" font-size="15" opacity="0.85">CHAMBRE 1</text>
  <text x="620" y="420" fill="#C6F135" font-family="monospace" font-size="15" opacity="0.85">CHAMBRE 2</text>
  <text x="870" y="530" fill="#C6F135" font-family="monospace" font-size="15" opacity="0.85">SDB</text>
</svg>
